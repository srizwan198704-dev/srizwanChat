<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ব্যক্তিগত চ্যাট</title>

<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>
:root {
  --bg-color: #111;
  --my-msg: #4fc3f7;
  --other-msg: #333;
  --text-main: #fff;
  --accent: #aaa;
}

body {
  margin: 0;
  font-family: 'Hind Siliguri', sans-serif;
  background-color: var(--bg-color);
  color: var(--text-main);
  display: flex;
  flex-direction: column;
  height: 100vh;
  height: 100dvh; /* কীবোর্ড অনুযায়ী হাইট এডজাস্ট করবে */
  overflow: hidden;
}

#status {
  font-size: 13px;
  color: var(--accent);
  padding: 10px;
  text-align: center;
  background: rgba(255,255,255,0.05);
}

#msg-container {
  flex: 1;
  overflow-y: auto;
  padding: 15px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.message {
  max-width: 75%;
  padding: 10px 14px;
  border-radius: 18px;
  font-size: 16px;
  word-wrap: break-word;
  line-height: 1.4;
}

.me { 
  align-self: flex-end; 
  background: var(--my-msg); 
  color: #000; 
  border-bottom-right-radius: 2px;
}

.other { 
  align-self: flex-start; 
  background: var(--other-msg); 
  color: #fff; 
  border-bottom-left-radius: 2px;
}

.big-emoji { 
  font-size: 65px; 
  background: transparent !important; 
  padding: 0 !important; 
}

#input-box {
  display: flex;
  padding: 12px 15px 25px 15px; /* নিচের দিকে কিছুটা জায়গা বাড়ানো হয়েছে */
  background: #111;
  align-items: center;
  gap: 10px;
  border-top: 1px solid #222;
}

#input {
  flex: 1;
  padding: 12px 18px;
  border-radius: 25px;
  border: 1px solid #333;
  background: #222;
  color: #fff;
  outline: none;
  font-size: 16px;
  font-family: inherit;
}

#action-btn {
  background: transparent;
  border: none;
  color: var(--my-msg);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  min-width: 45px;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

.material-icons { font-size: 32px; }
.emoji-btn { font-size: 30px; }

/* স্ক্রলবার হাইড বা স্টাইল */
#msg-container::-webkit-scrollbar { width: 3px; }
#msg-container::-webkit-scrollbar-thumb { background: #333; }
</style>
</head>

<body>

<div id="status">সংযোগ করা হচ্ছে...</div>
<div id="msg-container"></div>

<div id="input-box">
  <input id="input" placeholder="বার্তা লিখুন..." autocomplete="off">
  <button id="action-btn" 
    onmousedown="startPress()" 
    onmouseup="endPress()" 
    ontouchstart="startPress()" 
    ontouchend="endPress()">
    <span class="emoji-btn">💋</span>
  </button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, set, onValue, onDisconnect } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDqjbhRTpFgwRtZrqCG-ckO-UM_uZqh2Rc",
  authDomain: "srizwanchat.firebaseapp.com",
  projectId: "srizwanchat",
  storageBucket: "srizwanchat.firebasestorage.app",
  messagingSenderId: "101112162367",
  appId: "1:101112162367:web:5d33f592297f4f9967b08a",
  measurementId: "G-8XHB9HQTMR"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const chatRef = ref(db, "chat");
const onlineRef = ref(db, "online");

// ডিভাইস আইডি সেটআপ
let myId = localStorage.getItem("chat_user_id") || "U-" + Math.floor(Math.random()*9999);
localStorage.setItem("chat_user_id", myId);

// অনলাইন স্ট্যাটাস ট্র্যাকিং
set(ref(db, "online/" + myId), true);
onDisconnect(ref(db, "online/" + myId)).remove();
onValue(onlineRef, snap => {
  const count = snap.size || 0;
  document.getElementById("status").innerText = count + " জন অনলাইনে আছেন";
});

const input = document.getElementById("input");
const btn = document.getElementById("action-btn");

// আইকন পরিবর্তন লজিক
input.addEventListener("input", () => {
  if (input.value.trim() !== "") {
    btn.innerHTML = '<span class="material-icons">send</span>';
  } else {
    btn.innerHTML = '<span class="emoji-btn">💋</span>';
  }
});

let pressTimer;
let isLongPress = false;

window.startPress = function() {
  if(input.value.trim() !== "") return;
  isLongPress = false;
  pressTimer = setTimeout(() => {
    isLongPress = true;
    sendMsg("💋", true);
  }, 800);
};

window.endPress = function() {
  clearTimeout(pressTimer);
  const text = input.value.trim();
  
  if (text !== "") {
    sendMsg(text, false);
  } else if (!isLongPress) {
    sendMsg("💋", false);
  }
};

function sendMsg(text, isBig) {
  if(!text) return;
  push(chatRef, {
    sender: myId,
    msg: text,
    big: isBig,
    time: Date.now()
  });
  input.value = "";
  btn.innerHTML = '<span class="emoji-btn">💋</span>';
}

input.addEventListener("keypress", (e) => { 
  if(e.key === "Enter") sendMsg(input.value.trim(), false); 
});

// মেসেজ রিসিভ এবং ডিসপ্লে
onChildAdded(chatRef, snap => {
  const d = snap.val();
  const container = document.getElementById("msg-container");
  const div = document.createElement("div");
  const isMe = d.sender === myId;

  div.className = `message ${isMe ? 'me' : 'other'} ${d.big ? 'big-emoji' : ''}`;
  div.innerHTML = `<div class="text">${d.msg}</div>`;

  container.appendChild(div);
  
  // নতুন মেসেজ আসলে অটো স্ক্রল
  setTimeout(() => {
    container.scrollTop = container.scrollHeight;
  }, 100);
});
</script>

</body>
</html>
