<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>S2izwan</title>

<link href="https://fonts.maateen.me/solaiman-lipi/font.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>
:root {
  --bg-color: #111;
  --my-msg: #4fc3f7;
  --other-msg: #333;
  --text-main: #fff;
  --accent: #aaa;
  --font-main: 'SolaimanLipi', sans-serif;
}

html, body {
  height: 100%;
  margin: 0;
  padding: 0;
  overflow: hidden;
  background-color: var(--bg-color);
}

body {
  font-family: var(--font-main);
  color: var(--text-main);
  display: flex;
  flex-direction: column;
  height: 100vh;
  height: -webkit-fill-available;
}

#header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 15px;
  background: rgba(255,255,255,0.05);
  border-bottom: 1px solid #222;
  flex-shrink: 0;
}

#status {
  font-size: 14px;
  color: var(--accent);
  flex: 1;
  text-align: center;
}

.delete-btn {
  color: #ff5252;
  cursor: pointer;
  background: none;
  border: none;
  display: flex;
  align-items: center;
  outline: none;
}

#msg-container {
  flex: 1;
  overflow-y: auto;
  padding: 15px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  -webkit-overflow-scrolling: touch;
}

/* মেসেজ সেন্ড করার অ্যানিমেশন */
@keyframes slideInUp {
  from { transform: translateY(20px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.message {
  max-width: 75%;
  padding: 10px 14px;
  border-radius: 18px;
  font-size: 17px;
  word-wrap: break-word;
  line-height: 1.5;
  position: relative;
  /* অ্যানিমেশন যোগ করা হলো */
  animation: slideInUp 0.3s ease-out;
  will-change: transform, opacity;
}

.me { align-self: flex-end; background: var(--my-msg); color: #000; border-bottom-right-radius: 2px;}
.other { align-self: flex-start; background: var(--other-msg); color: #fff; border-bottom-left-radius: 2px;}

.big-emoji { font-size: 65px; background: transparent !important; padding: 0 !important; }

#input-box {
  display: flex;
  padding: 12px 15px;
  background: #111;
  align-items: center;
  gap: 10px;
  border-top: 1px solid #222;
  flex-shrink: 0;
  padding-bottom: calc(12px + env(safe-area-inset-bottom));
}

#input {
  flex: 1;
  padding: 12px 18px;
  border-radius: 25px;
  border: 1px solid #333;
  background: #222;
  color: #fff;
  outline: none;
  font-size: 16px;
  font-family: var(--font-main);
}

#action-btn {
  background: transparent;
  border: none;
  color: var(--my-msg);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  min-width: 45px;
  position: relative;
}

.material-icons { font-size: 30px; }

/* রিয়াকশন বাটন এনিমেশন */
.emoji-btn {
  font-size: 28px;
  transition: transform 0.1s linear; /* স্মুথ গ্রোইংয়ের জন্য */
  display: inline-block;
  will-change: transform;
}

/* লং প্রেস করলে বাটন বড় হবে (CSS ক্লাস) */
.emoji-btn.growing {
  transform: scale(2.5); /* কতটুকু বড় হবে */
}

#msg-container::-webkit-scrollbar { width: 3px; }
#msg-container::-webkit-scrollbar-thumb { background: #333; }
</style>
</head>

<body>

<div id="header">
  <div style="width: 40px;"></div>
  <div id="status">সংযোগ করা হচ্ছে...</div>
  <button class="delete-btn" onclick="clearChat()">
    <span class="material-icons">delete_sweep</span>
  </button>
</div>

<div id="msg-container"></div>

<div id="input-box">
  <input id="input" placeholder="বার্তা লিখুন..." autocomplete="off">
  <button id="action-btn">
    <span class="emoji-btn" id="emoji-icon">💋</span>
  </button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, set, onValue, onDisconnect, remove } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

// Firebase কনফিগ (আপনার আগেরটাই রাখা হয়েছে)
const firebaseConfig = {
  apiKey: "AIzaSyDqjbhRTpFgwRtZrqCG-ckO-UM_uZqh2Rc",
  authDomain: "srizwanchat.firebaseapp.com",
  projectId: "srizwanchat",
  storageBucket: "srizwanchat.firebasestorage.app",
  messagingSenderId: "101112162367",
  appId: "1:101112162367:web:5d33f592297f4f9967b08a",
  measurementId: "G-8XHB9HQTMR"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const chatRef = ref(db, "chat");
const onlineRef = ref(db, "online");

let myId = localStorage.getItem("chat_user_id") || "U-" + Math.floor(Math.random()*9999);
localStorage.setItem("chat_user_id", myId);

function toBanglaNum(num) {
  const bNum = {'0':'০','1':'১','2':'২','3':'৩','4':'৪','5':'৫','6':'৬','7':'৭','8':'৮','9':'৯'};
  return num.toString().split('').map(d => bNum[d] || d).join('');
}

set(ref(db, "online/" + myId), true);
onDisconnect(ref(db, "online/" + myId)).remove();
onValue(onlineRef, snap => {
  document.getElementById("status").innerText = toBanglaNum(snap.size || 0) + " জন অনলাইনে আছেন";
});

const input = document.getElementById("input");
const btn = document.getElementById("action-btn");
const emojiIcon = document.getElementById("emoji-icon");
const container = document.getElementById("msg-container");

// কীবোর্ড ফিক্স
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', () => {
    document.body.style.height = window.visualViewport.height + 'px';
    container.scrollTop = container.scrollHeight;
  });
}

input.addEventListener("input", () => {
  btn.innerHTML = input.value.trim() !== "" ? '<span class="material-icons">send</span>' : '<span class="emoji-btn" id="emoji-icon">💋</span>';
});

let pressTimer;
let isLongPress = false;
let isActionFired = false;
const LONG_PRESS_TIME = 700; // কতক্ষণ চেপে ধরলে বড় হবে (মিলিসেকেন্ড)

const handleStart = (e) => {
  // শুধু ইমোজি মোডে লং প্রেস কাজ করবে
  if(input.value.trim() !== "") return;
  
  if (e.type === 'touchstart' && e.cancelable) e.preventDefault(); 
  isActionFired = false;
  isLongPress = false;

  // CSS ক্লাস যোগ করে এনিমেশন শুরু (বড় হওয়া)
  const targetEmoji = document.getElementById("emoji-icon");
  if(targetEmoji) targetEmoji.classList.add("growing");

  pressTimer = setTimeout(() => {
    isLongPress = true;
    isActionFired = true;
    sendMsg("💋", true); // বড় ইমোজি পাঠাবে
    
    // পাঠানোর পর ক্লাস রিমুভ (ছোট করা)
    if(targetEmoji) targetEmoji.classList.remove("growing");
  }, LONG_PRESS_TIME);
};

const handleEnd = (e) => {
  if(input.value.trim() === "") {
    if (e.type === 'touchend' && e.cancelable) e.preventDefault();
  }
  
  clearTimeout(pressTimer);
  
  // বাটন ছেড়ে দিলে এনিমেশন ক্লাস রিমুভ
  const targetEmoji = document.getElementById("emoji-icon");
  if(targetEmoji) targetEmoji.classList.remove("growing");

  if (isActionFired) return; // লং প্রেস ফায়ার হয়ে গেলে আর কিছু করবে না

  const text = input.value.trim();
  if (text !== "") {
    sendMsg(text, false);
  } else if (!isLongPress && e.target.closest('#action-btn')) {
    // শুধু ক্লিক করলে ছোট ইমোজি
    sendMsg("💋", false);
  }
  isActionFired = true;
};

// ইভেন্ট লিসেনার (মোবাইল ও ডেস্কটপ)
btn.addEventListener('touchstart', handleStart, {passive: false});
btn.addEventListener('touchend', handleEnd, {passive: false});
btn.addEventListener('mousedown', handleStart);
btn.addEventListener('mouseup', handleEnd);
btn.addEventListener('mouseleave', handleEnd); // মাউস বাটন থেকে সরে গেলে

// ১. কনফার্ম ছাড়া ডিলিট ফিক্স
window.clearChat = function() {
  // confirm() ফাংশনটি সরিয়ে দেওয়া হয়েছে
  remove(chatRef);
};

function sendMsg(text, isBig) {
  if(!text.trim()) return;
  push(chatRef, { sender: myId, msg: text, big: isBig, time: Date.now() });
  input.value = "";
  // বাটন রিসেট
  btn.innerHTML = '<span class="emoji-btn" id="emoji-icon">💋</span>';
  setTimeout(() => { container.scrollTop = container.scrollHeight; }, 100);
}

input.addEventListener("keypress", (e) => { 
    if(e.key === "Enter") {
        sendMsg(input.value.trim(), false); 
        input.blur(); 
    }
});

onChildAdded(chatRef, snap => {
  const d = snap.val();
  const div = document.createElement("div");
  const isMe = d.sender === myId;
  div.className = `message ${isMe ? 'me' : 'other'} ${d.big ? 'big-emoji' : ''}`;
  div.innerHTML = `<div class="text">${d.msg}</div>`;
  container.appendChild(div);
  
  // নতুন মেসেজ আসলে অটো স্ক্রল
  requestAnimationFrame(() => {
    container.scrollTop = container.scrollHeight;
  });
});

onValue(chatRef, snap => { if(!snap.exists()) container.innerHTML = ""; });
</script>
</body>
</html>
