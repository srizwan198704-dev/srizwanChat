<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Private Duo Chat</title>

<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>
:root {
  --bg-color: #111;
  --my-msg: #4fc3f7;
  --other-msg: #333;
  --text-main: #fff;
  --accent: #aaa;
}

body {
  margin: 0;
  font-family: 'Hind Siliguri', sans-serif;
  background-color: var(--bg-color);
  color: var(--text-main);
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

#status {
  font-size: 12px;
  color: var(--accent);
  padding: 8px;
  text-align: center;
  background: rgba(255,255,255,0.05);
}

#msg-container {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.message {
  max-width: 75%;
  padding: 8px 12px;
  border-radius: 15px;
  font-size: 16px;
  word-wrap: break-word;
}

.me { align-self: flex-end; background: var(--my-msg); color: #000; border-bottom-right-radius: 2px;}
.other { align-self: flex-start; background: var(--other-msg); color: #fff; border-bottom-left-radius: 2px;}

.big-emoji { font-size: 60px; background: transparent !important; padding: 0 !important; }

#input-box {
  display: flex;
  padding: 10px;
  background: #111;
  align-items: center;
  gap: 8px;
  border-top: 1px solid #222;
  padding-bottom: env(safe-area-inset-bottom);
}

#input {
  flex: 1;
  padding: 10px 15px;
  border-radius: 20px;
  border: 1px solid #333;
  background: #222;
  color: #fff;
  outline: none;
  font-size: 16px;
}

#action-btn {
  background: transparent;
  border: none;
  color: var(--my-msg);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  min-width: 45px;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

.material-icons { font-size: 30px; }
.emoji-btn { font-size: 28px; }
</style>
</head>

<body>

<div id="status">Connecting...</div>
<div id="msg-container"></div>

<div id="input-box">
  <input id="input" placeholder="message..." autocomplete="off">
  <button id="action-btn" 
    onmousedown="startPress()" 
    onmouseup="endPress()" 
    ontouchstart="startPress()" 
    ontouchend="endPress()">
    <span class="emoji-btn">💋</span>
  </button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, set, onValue, onDisconnect } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDqjbhRTpFgwRtZrqCG-ckO-UM_uZqh2Rc",
  authDomain: "srizwanchat.firebaseapp.com",
  projectId: "srizwanchat",
  storageBucket: "srizwanchat.firebasestorage.app",
  messagingSenderId: "101112162367",
  appId: "1:101112162367:web:5d33f592297f4f9967b08a",
  measurementId: "G-8XHB9HQTMR"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const chatRef = ref(db, "chat");
const onlineRef = ref(db, "online");

let myId = localStorage.getItem("chat_user_id") || "U-" + Math.floor(Math.random()*9999);
localStorage.setItem("chat_user_id", myId);

set(ref(db, "online/" + myId), true);
onDisconnect(ref(db, "online/" + myId)).remove();
onValue(onlineRef, snap => {
  document.getElementById("status").innerText = (snap.size || 0) + " online";
});

const input = document.getElementById("input");
const btn = document.getElementById("action-btn");

// আইকন পরিবর্তন লজিক
input.addEventListener("input", () => {
  if (input.value.trim() !== "") {
    btn.innerHTML = '<span class="material-icons">send</span>';
  } else {
    btn.innerHTML = '<span class="emoji-btn">💋</span>';
  }
});

let pressTimer;
let isLongPress = false;

window.startPress = function() {
  if(input.value.trim() !== "") return; // টাইপ করলে লং প্রেস কাজ করবে না
  isLongPress = false;
  pressTimer = setTimeout(() => {
    isLongPress = true;
    sendMsg("💋", true);
  }, 800);
};

window.endPress = function() {
  clearTimeout(pressTimer);
  const text = input.value.trim();
  
  if (text !== "") {
    // যদি বক্সে লেখা থাকে তবে শুধু লেখা যাবে
    sendMsg(text, false);
  } else if (!isLongPress) {
    // যদি লেখা না থাকে এবং লং প্রেস না হয়ে থাকে তবে ছোট ইমোজি যাবে
    sendMsg("💋", false);
  }
};

function sendMsg(text, isBig) {
  if(!text) return;
  push(chatRef, {
    sender: myId,
    msg: text,
    big: isBig,
    time: Date.now()
  });
  input.value = "";
  btn.innerHTML = '<span class="emoji-btn">💋</span>';
}

input.addEventListener("keypress", (e) => { if(e.key === "Enter") sendMsg(input.value.trim(), false); });

onChildAdded(chatRef, snap => {
  const d = snap.val();
  const container = document.getElementById("msg-container");
  const div = document.createElement("div");
  const isMe = d.sender === myId;

  div.className = `message ${isMe ? 'me' : 'other'} ${d.big ? 'big-emoji' : ''}`;
  div.innerHTML = `<div class="text">${d.msg}</div>`;

  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
});
</script>

</body>
</html>
