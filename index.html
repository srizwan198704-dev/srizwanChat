<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#111">
<title>S2izwan Chat</title>
<link href="https://fonts.maateen.me/solaiman-lipi/font.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>
:root {
  --bg-color: #111;
  --my-msg: #0084ff;
  --other-msg: #333;
  --text-main: #fff;
  --accent: #aaa;
  --font-main: 'SolaimanLipi', sans-serif;
}

html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: var(--bg-color); }
body { font-family: var(--font-main); color: var(--text-main); display: flex; flex-direction: column; height: 100vh; height: -webkit-fill-available; }

#header { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: rgba(255,255,255,0.05); border-bottom: 1px solid #222; flex-shrink: 0; }
#status { font-size: 14px; color: var(--accent); flex: 1; text-align: center; }
.delete-btn { color: #ff5252; cursor: pointer; background: none; border: none; display: flex; align-items: center; }

#msg-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 5px; -webkit-overflow-scrolling: touch; }

.message-wrapper { display: flex; flex-direction: column; width: 100%; animation: slideInUp 0.3s ease-out; }
@keyframes slideInUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

.message { max-width: 75%; padding: 10px 14px; border-radius: 18px; font-size: 17px; word-wrap: break-word; line-height: 1.5; cursor: pointer; }
.me { align-self: flex-end; background: var(--my-msg); color: #fff; border-bottom-right-radius: 2px;}
.other { align-self: flex-start; background: var(--other-msg); color: #fff; border-bottom-left-radius: 2px;}
.big-emoji { font-size: 65px; background: transparent !important; padding: 0 !important; }

.info-row { display: flex; flex-direction: column; margin-top: 2px; margin-bottom: 8px; }
.time-stamp { font-size: 10px; color: var(--accent); display: none; }
.seen-status { font-size: 11px; color: #0084ff; margin-top: 2px; font-weight: bold; display: none; }
.me-info { align-self: flex-end; text-align: right; margin-right: 5px; }
.other-info { align-self: flex-start; text-align: left; margin-left: 5px; }
.show-info { display: block; }

#input-box { display: flex; padding: 12px 15px; background: #111; align-items: center; gap: 10px; border-top: 1px solid #222; flex-shrink: 0; padding-bottom: calc(12px + env(safe-area-inset-bottom)); }
#input { flex: 1; padding: 12px 18px; border-radius: 25px; border: 1px solid #333; background: #222; color: #fff; outline: none; font-size: 16px; font-family: var(--font-main); }
#action-btn { background: transparent; border: none; color: #0084ff; cursor: pointer; display: flex; align-items: center; justify-content: center; min-width: 45px; }
.emoji-btn { font-size: 28px; transition: transform 0.1s linear; display: inline-block; }
.emoji-btn.growing { transform: scale(2.5); }
</style>
</head>

<body>

<div id="header">
  <div style="width: 40px;"></div>
  <div id="status">সংযোগ করা হচ্ছে...</div>
  <button class="delete-btn" onclick="clearChat()"><span class="material-icons">delete_sweep</span></button>
</div>

<div id="msg-container"></div>

<div id="input-box">
  <input id="input" placeholder="মেসেজ..." autocomplete="off">
  <button id="action-btn"><span class="emoji-btn" id="emoji-icon">💋</span></button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, set, onValue, onDisconnect, remove, update } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDqjbhRTpFgwRtZrqCG-ckO-UM_uZqh2Rc",
  authDomain: "srizwanchat.firebaseapp.com",
  projectId: "srizwanchat",
  storageBucket: "srizwanchat.firebasestorage.app",
  messagingSenderId: "101112162367",
  appId: "1:101112162367:web:5d33f592297f4f9967b08a",
  measurementId: "G-8XHB9HQTMR"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const chatRef = ref(db, "chat");
const onlineRef = ref(db, "online");

let myId = localStorage.getItem("chat_user_id") || "U-" + Math.floor(Math.random()*9999);
localStorage.setItem("chat_user_id", myId);

// অনলাইন স্ট্যাটাস
onValue(ref(db, ".info/connected"), (snap) => {
  if (snap.val() === true) {
    set(ref(db, "online/" + myId), true);
    onDisconnect(ref(db, "online/" + myId)).remove();
  }
});

function toBanglaNum(num) {
  const bNum = {'0':'০','1':'১','2':'২','3':'৩','4':'৪','5':'৫','6':'৬','7':'৭','8':'৮','9':'৯'};
  return num.toString().split('').map(d => bNum[d] || d).join('');
}

function formatTime(timestamp) {
  const date = new Date(timestamp);
  let hours = date.getHours();
  let minutes = date.getMinutes();
  const ampm = hours >= 12 ? 'পিএম' : 'এএম';
  hours = hours % 12 || 12;
  minutes = minutes < 10 ? '0'+minutes : minutes;
  return toBanglaNum(hours) + ':' + toBanglaNum(minutes) + ' ' + ampm;
}

onValue(onlineRef, snap => {
  const count = snap.size || 0;
  document.getElementById("status").innerText = count > 0 ? toBanglaNum(count) + " জন অনলাইনে আছেন" : "কেউ অনলাইনে নেই";
});

const input = document.getElementById("input");
const btn = document.getElementById("action-btn");
const container = document.getElementById("msg-container");

function sendMsg(text, isBig) {
  if(!text.trim()) return;
  const msgData = {
    sender: myId,
    msg: text,
    big: isBig,
    time: Date.now(),
    seenBy: { [myId]: true } // পাঠানোর সময় নিজে দেখেছে
  };
  push(chatRef, msgData);
  input.value = "";
  btn.innerHTML = '<span class="emoji-btn" id="emoji-icon">💋</span>';
}

onChildAdded(chatRef, snap => {
  const d = snap.val();
  const msgId = snap.key;
  const isMe = d.sender === myId;
  
  const wrapper = document.createElement("div");
  wrapper.className = "message-wrapper";
  wrapper.id = "wrap-" + msgId;
  
  const div = document.createElement("div");
  div.className = `message ${isMe ? 'me' : 'other'} ${d.big ? 'big-emoji' : ''}`;
  div.innerHTML = `<div class="text">${d.msg}</div>`;
  
  const infoDiv = document.createElement("div");
  infoDiv.className = `info-row ${isMe ? 'me-info' : 'other-info'}`;
  
  const timeSpan = document.createElement("span");
  timeSpan.className = "time-stamp";
  timeSpan.innerText = formatTime(d.time);
  
  const seenSpan = document.createElement("span");
  seenSpan.className = "seen-status";
  seenSpan.id = "seen-" + msgId;
  seenSpan.innerText = "দেখা হয়েছে";

  // যদি অন্য কারো মেসেজ হয় এবং আমি এখনো না দেখে থাকি, তবে Seen আপডেট করো
  if (!isMe && (!d.seenBy || !d.seenBy[myId])) {
    update(ref(db, `chat/${msgId}/seenBy`), { [myId]: true });
  }

  // রিয়েল-টাইম দেখা হয়েছে কি না চেক করা
  onValue(ref(db, `chat/${msgId}/seenBy`), (seenSnap) => {
    const seenData = seenSnap.val() || {};
    const viewers = Object.keys(seenData).filter(id => id !== d.sender);
    if (isMe && viewers.length > 0) {
      seenSpan.style.display = "block";
    }
  });

  div.addEventListener('click', () => { timeSpan.classList.toggle('show-info'); });
  
  infoDiv.appendChild(timeSpan);
  if(isMe) infoDiv.appendChild(seenSpan);
  wrapper.appendChild(div);
  wrapper.appendChild(infoDiv);
  container.appendChild(wrapper);
  container.scrollTop = container.scrollHeight;
});

// ইনপুট হ্যান্ডলিং
input.addEventListener("input", () => {
  btn.innerHTML = input.value.trim() !== "" ? '<span class="material-icons">send</span>' : '<span class="emoji-btn" id="emoji-icon">💋</span>';
});

// বাটন ক্লিক ইভেন্ট
btn.onclick = () => {
  const text = input.value.trim();
  if(text !== "") sendMsg(text, false);
  else sendMsg("💋", false);
};

window.clearChat = () => { remove(chatRef); };
</script>
</body>
</html>
