<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Private Duo Chat</title>

<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>
:root {
  --bg-color: #0f172a;
  --card-bg: #1e293b;
  --my-msg: #3b82f6;
  --other-msg: #334155;
  --text-main: #f8fafc;
  --accent: #60a5fa;
}

body {
  margin: 0;
  font-family: 'Hind Siliguri', sans-serif;
  background-color: var(--bg-color);
  color: var(--text-main);
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

#status-bar {
  padding: 10px;
  background: var(--card-bg);
  text-align: center;
  font-size: 12px;
  border-bottom: 1px solid #334155;
  color: var(--accent);
  letter-spacing: 1px;
}

#msg-container {
  flex: 1;
  overflow-y: auto;
  padding: 15px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  scroll-behavior: smooth;
}

.message {
  max-width: 75%;
  padding: 10px 14px;
  border-radius: 18px;
  font-size: 15px;
  word-wrap: break-word;
  line-height: 1.4;
}

/* Side by Side Logic */
.me { 
  align-self: flex-end; 
  background: var(--my-msg); 
  color: white; 
  border-bottom-right-radius: 2px;
}

.other { 
  align-self: flex-start; 
  background: var(--other-msg); 
  color: white; 
  border-bottom-left-radius: 2px;
}

/* Big Emoji Style */
.big-emoji { 
  font-size: 60px; 
  background: transparent !important; 
  padding: 0 !important; 
  align-self: center; /* СҖР¶РјСҖР·Р¬ СҖР¶Р—СҖР¶РҫСҖР·РӣСҖР¶Р¬СҖР¶в”җ СҖР¶РҫСҖР¶в•ӣСҖР¶РӯСҖР¶РҰСҖР¶в•ӣСҖР¶РёСҖР·Р— СҖР¶Р¶СҖР·Р—СҖР¶РҰСҖР¶в•ӣСҖР¶в–“СҖР·Р— СҖР¶в••СҖР·Р‘СҖР¶РёСҖР·РқСҖР¶Р¶СҖР¶в–‘ СҖР¶в–“СҖР¶в•ӣСҖР¶Р§СҖР·Р— */
}
.me.big-emoji { align-self: flex-end; }
.other.big-emoji { align-self: flex-start; }

#input-box {
  padding: 12px;
  background: var(--card-bg);
  display: flex;
  align-items: center;
  gap: 10px;
  padding-bottom: env(safe-area-inset-bottom); /* iOS support */
}

#input {
  flex: 1;
  padding: 12px 18px;
  border-radius: 25px;
  border: none;
  background: #0f172a;
  color: white;
  outline: none;
  font-size: 16px;
}

#action-btn {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  border: none;
  background: transparent;
  color: var(--my-msg);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

.material-icons { font-size: 30px; }
.emoji-btn { font-size: 28px; transition: 0.2s; }
#action-btn:active .emoji-btn { transform: scale(1.3); }

#msg-container::-webkit-scrollbar { width: 3px; }
#msg-container::-webkit-scrollbar-thumb { background: #334155; }
</style>
</head>

<body>

<div id="status-bar">СҖР¶Р•СҖР¶РјСҖР¶в••СҖР·РқСҖР¶РөСҖР¶в•ӣ СҖР¶РәСҖР¶в–‘СҖР·РҗСҖР¶РҘСҖР·РқСҖР¶в•–СҖР¶в•ӣ СҖР¶РҘСҖР¶в–‘СҖР¶в•ӣ СҖР¶в•ЈСҖР¶РӘСҖР·РқСҖР¶Р«СҖР·Р—...</div>
<div id="msg-container"></div>

<div id="input-box">
  <input id="input" placeholder="СҖР¶РҘСҖР¶в”җСҖР¶Р«СҖР·Р‘ СҖР¶в–“СҖР¶в”җСҖР¶РҰСҖР·Р‘СҖР¶Рё..." autocomplete="off">
  <button id="action-btn" onmousedown="startPress()" onmouseup="endPress()" ontouchstart="startPress()" ontouchend="endPress()">
    <span class="emoji-btn">РҒРҜРўРӣ</span>
  </button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, set, onValue, onDisconnect } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDqjbhRTpFgwRtZrqCG-ckO-UM_uZqh2Rc",
  authDomain: "srizwanchat.firebaseapp.com",
  projectId: "srizwanchat",
  storageBucket: "srizwanchat.firebasestorage.app",
  messagingSenderId: "101112162367",
  appId: "1:101112162367:web:5d33f592297f4f9967b08a",
  measurementId: "G-8XHB9HQTMR"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const chatRef = ref(db, "chat");
const onlineRef = ref(db, "online");

// --- Device/User ID Logic ---
// СҖР¶РҹСҖР¶РҜСҖР¶в”җ СҖР¶Р–СҖР¶РәСҖР¶РёСҖР¶в•ӣСҖР¶в–‘ СҖР¶РұСҖР¶в”җСҖР¶РҪСҖР¶в•ӣСҖР¶Р—СҖР¶в•• СҖР¶Р–СҖР¶Р—СҖР¶РұСҖР¶в”җ СҖР¶в••СҖР·Р—СҖР¶РҪ СҖР¶РҘСҖР¶в–‘СҖР·Р— СҖР¶в–‘СҖР¶в•ӣСҖР¶РҰСҖР¶РјСҖР·Р— СҖР¶РҝСҖР¶в•ӣСҖР¶РҙСҖР·Р— СҖР¶в–‘СҖР¶в”җСҖР¶Р»СҖР·РқСҖР¶в–‘СҖР·Р—СҖР¶в•ў СҖР¶РҘСҖР¶в–‘СҖР¶в–“СҖР·Р— СҖР¶в••СҖР¶в•ӣСҖР¶Р—СҖР¶Рұ СҖР¶РәСҖР¶в–‘СҖР¶в”җСҖР¶РјСҖР¶в–‘СҖР·РқСҖР¶РҙСҖР¶Рё СҖР¶РёСҖР¶в•ӣ СҖР¶в•ЈСҖР·РҜ
let myId = localStorage.getItem("chat_user_id");
if (!myId) {
  myId = "UID-" + Math.random().toString(36).substr(2, 9);
  localStorage.setItem("chat_user_id", myId);
}

// Online Tracking
set(ref(db, "online/" + myId), true);
onDisconnect(ref(db, "online/" + myId)).remove();
onValue(onlineRef, snap => {
  const count = snap.size || 0;
  document.getElementById("status-bar").innerText = count === 2 ? "РҒРҜРҜРІ СҖР¶Р¶СҖР·Р‘СҖР¶Р—СҖР¶Р¬СҖР¶РёСҖР¶Р— СҖР¶Р•СҖР¶РёСҖР¶в–“СҖР¶в•ӣСҖР¶Р—СҖР¶РёСҖР·Р— СҖР¶Р–СҖР¶Р«СҖР·Р—СҖР¶Рё" : "РҒРҜРҜРұ СҖР·Р· СҖР¶Р¬СҖР¶Рё СҖР¶Р•СҖР¶РёСҖР¶в–“СҖР¶в•ӣСҖР¶Р—СҖР¶Рё";
});

const input = document.getElementById("input");
const btn = document.getElementById("action-btn");

// Input UI change
input.addEventListener("input", () => {
  btn.innerHTML = input.value.trim() !== "" 
    ? '<span class="material-icons">send</span>' 
    : '<span class="emoji-btn">РҒРҜРўРӣ</span>';
});

// Long Press Logic for Big РҒРҜРўРӣ
let pressTimer;
let isLongPress = false;

window.startPress = function(e) {
  if(input.value.trim() !== "") return;
  isLongPress = false;
  pressTimer = setTimeout(() => {
    isLongPress = true;
    sendMsg("РҒРҜРўРӣ", true);
  }, 800); // СҖР·РҫСҖР·Р¶СҖР·Р¶ СҖР¶РҫСҖР¶в”җСҖР¶в–“СҖР¶в”җСҖР¶в••СҖР·Р—СҖР¶РҘСҖР·Р—СҖР¶РёСҖР·РқСҖР¶Рұ СҖР¶РӘСҖР¶в•ӣСҖР¶РәСҖР¶в–“СҖР·Р— СҖР¶РјСҖР·Р¬ СҖР¶в•ЈСҖР¶РјСҖР·Р—
};

window.endPress = function() {
  clearTimeout(pressTimer);
  if(input.value.trim() !== "") {
    sendMsg(input.value, false);
  } else if(!isLongPress) {
    sendMsg("РҒРҜРўРӣ", false);
  }
};

function sendMsg(text, isBig) {
  if(!text.trim()) return;
  push(chatRef, {
    sender: myId,
    msg: text,
    big: isBig,
    time: Date.now()
  });
  input.value = "";
  btn.innerHTML = '<span class="emoji-btn">РҒРҜРўРӣ</span>';
}

// Enter Key Support
input.addEventListener("keypress", (e) => { 
  if(e.key === "Enter") sendMsg(input.value, false); 
});

// Receive & Display Messages
onChildAdded(chatRef, snap => {
  const d = snap.val();
  const container = document.getElementById("msg-container");
  const div = document.createElement("div");
  
  // СҖР¶РӘСҖР·Р—СҖР¶РҘ СҖР¶РҘСҖР¶в–‘СҖР¶в•ӣ СҖР¶в•ЈСҖР¶РӘСҖР·РқСҖР¶Р«СҖР·Р— СҖР¶РҫСҖР·Р—СҖР¶в••СҖР·Р—СҖР¶Р¬СҖР¶РҜСҖР¶в”җ СҖР¶РҘСҖР¶в”җ СҖР¶РҹСҖР¶Р— СҖР¶РұСҖР¶в”җСҖР¶РҪСҖР¶в•ӣСҖР¶Р—СҖР¶в••СҖР·Р—СҖР¶в–‘ СҖР¶РёСҖР¶в•ӣСҖР¶РҘСҖР¶в”җ СҖР¶Р•СҖР¶РёСҖР·РқСҖР¶Рҝ СҖР¶РҘСҖР¶в•ӣСҖР¶в–‘СҖР·Рӣ
  const isMe = d.sender === myId;

  div.className = `message ${isMe ? 'me' : 'other'} ${d.big ? 'big-emoji' : ''}`;
  div.innerHTML = `<div class="text">${d.msg}</div>`;

  container.appendChild(div);
  
  // СҖР¶в••СҖР·РқСҖР¶РҘСҖР·РқСҖР¶в–‘СҖР¶в–“ СҖР¶в••СҖР¶РјСҖР¶в••СҖР¶РҫСҖР·РҜ СҖР¶РёСҖР¶в”җСҖР¶РӘСҖР·Р— СҖР¶в–‘СҖР¶в•ӣСҖР¶РҰСҖР¶в•ӣ
  container.scrollTop = container.scrollHeight;
});
</script>

</body>
</html>
