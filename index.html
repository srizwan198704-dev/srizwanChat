<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Anon Chat</title>

<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg-color: #0f172a;
  --card-bg: #1e293b;
  --my-msg: #3b82f6;
  --other-msg: #334155;
  --text-main: #f8fafc;
  --accent: #60a5fa;
}

body {
  margin: 0;
  font-family: 'Hind Siliguri', sans-serif;
  background-color: var(--bg-color);
  color: var(--text-main);
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* Header/Status Area */
#status-bar {
  padding: 15px;
  background: var(--card-bg);
  text-align: center;
  font-size: 14px;
  border-bottom: 1px solid #334155;
  color: var(--accent);
  font-weight: 600;
}

/* Chat Messages Area */
#msg-container {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* Bubble Styling */
.message {
  max-width: 75%;
  padding: 10px 15px;
  border-radius: 18px;
  font-size: 16px;
  line-height: 1.5;
  position: relative;
  word-wrap: break-word;
}

.me {
  align-self: flex-end;
  background-color: var(--my-msg);
  color: white;
  border-bottom-right-radius: 4px;
}

.other {
  align-self: flex-start;
  background-color: var(--other-msg);
  color: var(--text-main);
  border-bottom-left-radius: 4px;
}

.user-name {
  font-size: 11px;
  margin-bottom: 4px;
  display: block;
  opacity: 0.8;
}

/* Input Area */
#input-box {
  padding: 15px;
  background: var(--card-bg);
  display: flex;
  gap: 10px;
  border-top: 1px solid #334155;
}

input {
  flex: 1;
  padding: 12px 18px;
  border-radius: 25px;
  border: 1px solid #334155;
  background: #0f172a;
  color: white;
  outline: none;
  font-family: inherit;
}

input:focus {
  border-color: var(--accent);
}

button {
  background: var(--my-msg);
  color: white;
  border: none;
  padding: 0 20px;
  border-radius: 25px;
  cursor: pointer;
  font-weight: 600;
  transition: 0.3s;
}

button:hover {
  background: #2563eb;
}

/* Custom Scrollbar */
#msg-container::-webkit-scrollbar {
  width: 5px;
}
#msg-container::-webkit-scrollbar-thumb {
  background: #334155;
  border-radius: 10px;
}
</style>
</head>

<body>

<div id="status-bar">Connecting...</div>
<div id="msg-container"></div>

<div id="input-box">
  <input id="input" placeholder="আপনার বার্তা লিখুন..." autocomplete="off">
  <button onclick="send()">পাঠান</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, update, set, onValue, onDisconnect } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDqjbhRTpFgwRtZrqCG-ckO-UM_uZqh2Rc",
  authDomain: "srizwanchat.firebaseapp.com",
  projectId: "srizwanchat",
  storageBucket: "srizwanchat.firebasestorage.app",
  messagingSenderId: "101112162367",
  appId: "1:101112162367:web:5d33f592297f4f9967b08a",
  measurementId: "G-8XHB9HQTMR"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const chatRef = ref(db, "chat");
const onlineRef = ref(db, "online");
const typingRef = ref(db, "typing");

const user = "User-" + Math.floor(Math.random()*9999);

// Online System
set(ref(db, "online/" + user), true);
onDisconnect(ref(db, "online/" + user)).remove();

onValue(onlineRef, snap => {
  document.getElementById("status-bar").innerText = (snap.size || 0) + " জন অনলাইনে আছেন";
});

// Send Message
window.send = function() {
  let input = document.getElementById("input");
  let text = input.value.trim();
  if(!text) return;

  push(chatRef, {
    name: user,
    msg: text,
    time: Date.now()
  });

  input.value = "";
};

// Enter key support
document.getElementById("input").addEventListener("keypress", (e) => {
  if (e.key === "Enter") send();
});

// Typing Indicator
let typingTimeout;
document.getElementById("input").addEventListener("input", () => {
  set(typingRef, user + " লিখছেন...");
  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(() => set(typingRef, ""), 2000);
});

onValue(typingRef, snap => {
  let val = snap.val();
  if(val && !val.includes(user)) {
    document.getElementById("status-bar").innerText = val;
  }
});

// Receive Message
onChildAdded(chatRef, snap => {
  let d = snap.val();
  let container = document.getElementById("msg-container");
  let div = document.createElement("div");

  const isMe = d.name === user;
  div.className = `message ${isMe ? 'me' : 'other'}`;

  div.innerHTML = `
    <span class="user-name">${isMe ? 'আপনি' : d.name}</span>
    <div class="text">${d.msg}</div>
  `;

  container.appendChild(div);
  
  // Auto Scroll to bottom
  container.scrollTop = container.scrollHeight;
});
</script>

</body>
</html>
