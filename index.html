<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#111">
<title>S2izwan Chat</title>

<link rel="manifest" href="manifest.json">

<link href="https://fonts.maateen.me/solaiman-lipi/font.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>
:root {
  --bg-color: #111;
  --my-msg: #4fc3f7;
  --other-msg: #333;
  --text-main: #fff;
  --accent: #aaa;
  --font-main: 'SolaimanLipi', sans-serif;
}

html, body {
  height: 100%;
  margin: 0;
  padding: 0;
  overflow: hidden;
  background-color: var(--bg-color);
}

body {
  font-family: var(--font-main);
  color: var(--text-main);
  display: flex;
  flex-direction: column;
  height: 100vh;
  height: -webkit-fill-available;
}

#header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 15px;
  background: rgba(255,255,255,0.05);
  border-bottom: 1px solid #222;
  flex-shrink: 0;
}

#status {
  font-size: 14px;
  color: var(--accent);
  flex: 1;
  text-align: center;
}

.delete-btn {
  color: #ff5252;
  cursor: pointer;
  background: none;
  border: none;
  display: flex;
  align-items: center;
}

#msg-container {
  flex: 1;
  overflow-y: auto;
  padding: 15px;
  display: flex;
  flex-direction: column;
  gap: 5px; /* গ্যাপ কমানো হয়েছে যাতে সময় মেসেজের কাছে থাকে */
  -webkit-overflow-scrolling: touch;
}

@keyframes slideInUp {
  from { transform: translateY(10px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.message-wrapper {
  display: flex;
  flex-direction: column;
  width: 100%;
  animation: slideInUp 0.3s ease-out;
}

.message {
  max-width: 75%;
  padding: 10px 14px;
  border-radius: 18px;
  font-size: 17px;
  word-wrap: break-word;
  line-height: 1.5;
  cursor: pointer;
  user-select: none;
}

.me { align-self: flex-end; background: var(--my-msg); color: #000; border-bottom-right-radius: 2px;}
.other { align-self: flex-start; background: var(--other-msg); color: #fff; border-bottom-left-radius: 2px;}

.big-emoji { font-size: 65px; background: transparent !important; padding: 0 !important; }

/* সময় দেখানোর স্টাইল */
.time-stamp {
  font-size: 11px;
  color: var(--accent);
  margin-top: 2px;
  margin-bottom: 8px;
  display: none; /* শুরুতে লুকানো থাকবে */
  animation: slideInUp 0.2s ease-out;
}

.me-time { align-self: flex-end; margin-right: 5px; }
.other-time { align-self: flex-start; margin-left: 5px; }

/* ক্লিক করলে দেখানোর জন্য ক্লাস */
.show-time { display: block; }

#input-box {
  display: flex;
  padding: 12px 15px;
  background: #111;
  align-items: center;
  gap: 10px;
  border-top: 1px solid #222;
  flex-shrink: 0;
  padding-bottom: calc(12px + env(safe-area-inset-bottom));
}

#input {
  flex: 1;
  padding: 12px 18px;
  border-radius: 25px;
  border: 1px solid #333;
  background: #222;
  color: #fff;
  outline: none;
  font-size: 16px;
  font-family: var(--font-main);
}

#action-btn {
  background: transparent;
  border: none;
  color: var(--my-msg);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  min-width: 45px;
}

.emoji-btn {
  font-size: 28px;
  transition: transform 0.1s linear;
  display: inline-block;
}

.emoji-btn.growing {
  transform: scale(2.5);
}

#msg-container::-webkit-scrollbar { width: 3px; }
#msg-container::-webkit-scrollbar-thumb { background: #333; }
</style>
</head>

<body>

<div id="header">
  <div style="width: 40px;"></div>
  <div id="status">সংযোগ করা হচ্ছে...</div>
  <button class="delete-btn" onclick="clearChat()">
    <span class="material-icons">delete_sweep</span>
  </button>
</div>

<div id="msg-container"></div>

<div id="input-box">
  <input id="input" placeholder="মেসেজ..." autocomplete="off">
  <button id="action-btn">
    <span class="emoji-btn" id="emoji-icon">💋</span>
  </button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, set, onValue, onDisconnect, remove } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDqjbhRTpFgwRtZrqCG-ckO-UM_uZqh2Rc",
  authDomain: "srizwanchat.firebaseapp.com",
  projectId: "srizwanchat",
  storageBucket: "srizwanchat.firebasestorage.app",
  messagingSenderId: "101112162367",
  appId: "1:101112162367:web:5d33f592297f4f9967b08a",
  measurementId: "G-8XHB9HQTMR"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const chatRef = ref(db, "chat");
const onlineRef = ref(db, "online");

let myId = localStorage.getItem("chat_user_id") || "U-" + Math.floor(Math.random()*9999);
localStorage.setItem("chat_user_id", myId);

const connectedRef = ref(db, ".info/connected");
onValue(connectedRef, (snap) => {
  if (snap.val() === true) {
    const presenceRef = ref(db, "online/" + myId);
    set(presenceRef, true);
    onDisconnect(presenceRef).remove();
  }
});

function toBanglaNum(num) {
  const bNum = {'0':'০','1':'১','2':'২','3':'৩','4':'৪','5':'৫','6':'৬','7':'৭','8':'৮','9':'৯'};
  return num.toString().split('').map(d => bNum[d] || d).join('');
}

// সময় ফরম্যাট করার ফাংশন
function formatTime(timestamp) {
  const date = new Date(timestamp);
  let hours = date.getHours();
  let minutes = date.getMinutes();
  const ampm = hours >= 12 ? 'পিএম' : 'এএম';
  hours = hours % 12;
  hours = hours ? hours : 12; 
  minutes = minutes < 10 ? '0'+minutes : minutes;
  const strTime = toBanglaNum(hours) + ':' + toBanglaNum(minutes) + ' ' + ampm;
  const strDate = toBanglaNum(date.getDate()) + '/' + toBanglaNum(date.getMonth() + 1);
  return strDate + ' • ' + strTime;
}

onValue(onlineRef, snap => {
  const count = snap.size || 0;
  document.getElementById("status").innerText = count > 0 ? toBanglaNum(count) + " জন অনলাইনে আছেন" : "কেউ অনলাইনে নেই";
});

const input = document.getElementById("input");
const btn = document.getElementById("action-btn");
const container = document.getElementById("msg-container");

if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', () => {
    document.body.style.height = window.visualViewport.height + 'px';
    container.scrollTop = container.scrollHeight;
  });
}

input.addEventListener("input", () => {
  const val = input.value.trim();
  btn.innerHTML = val !== "" ? '<span class="material-icons">send</span>' : '<span class="emoji-btn" id="emoji-icon">💋</span>';
});

let pressTimer;
let isLongPress = false;
let isActionFired = false;

const handleStart = (e) => {
  isActionFired = false;
  isLongPress = false;
  if(input.value.trim() === "") {
    const emoji = document.getElementById("emoji-icon");
    if(emoji) emoji.classList.add("growing");
    pressTimer = setTimeout(() => {
      isLongPress = true;
      isActionFired = true;
      sendMsg("💋", true);
      if(emoji) emoji.classList.remove("growing");
    }, 700);
  }
};

const handleEnd = (e) => {
  clearTimeout(pressTimer);
  const emoji = document.getElementById("emoji-icon");
  if(emoji) emoji.classList.remove("growing");
  if (isActionFired) return;
  const text = input.value.trim();
  if (text !== "") {
    sendMsg(text, false);
  } else if (!isLongPress) {
    sendMsg("💋", false);
  }
  isActionFired = true;
};

btn.addEventListener('mousedown', handleStart);
btn.addEventListener('mouseup', handleEnd);
btn.addEventListener('touchstart', (e) => {
  if (e.cancelable) e.preventDefault();
  handleStart(e);
}, {passive: false});
btn.addEventListener('touchend', (e) => {
  if (e.cancelable) e.preventDefault();
  handleEnd(e);
}, {passive: false});

window.clearChat = function() {
  remove(chatRef);
};

function sendMsg(text, isBig) {
  if(!text.trim()) return;
  push(chatRef, { sender: myId, msg: text, big: isBig, time: Date.now() });
  input.value = "";
  btn.innerHTML = '<span class="emoji-btn" id="emoji-icon">💋</span>';
  setTimeout(() => { container.scrollTop = container.scrollHeight; }, 100);
}

input.addEventListener("keypress", (e) => { if(e.key === "Enter") sendMsg(input.value.trim(), false); });

onChildAdded(chatRef, snap => {
  const d = snap.val();
  const isMe = d.sender === myId;
  
  const wrapper = document.createElement("div");
  wrapper.className = "message-wrapper";
  
  const div = document.createElement("div");
  div.className = `message ${isMe ? 'me' : 'other'} ${d.big ? 'big-emoji' : ''}`;
  div.innerHTML = `<div class="text">${d.msg}</div>`;
  
  const timeDiv = document.createElement("div");
  timeDiv.className = `time-stamp ${isMe ? 'me-time' : 'other-time'}`;
  timeDiv.innerText = formatTime(d.time);
  
  // ক্লিকে সময় দেখানো/লুকানোর লজিক
  div.addEventListener('click', () => {
    timeDiv.classList.toggle('show-time');
  });
  
  wrapper.appendChild(div);
  wrapper.appendChild(timeDiv);
  container.appendChild(wrapper);
  container.scrollTop = container.scrollHeight;
});

onValue(chatRef, snap => { if(!snap.exists()) container.innerHTML = ""; });

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
